<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ПАБЕДА!!! С ДР</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: Arial, Helvetica, sans-serif;
        background: #000;
        color: #fff;
      }
      .screen {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .gate {
        background: rgba(0,0,0,0.72);
        border: 2px solid rgba(255,255,255,0.18);
        border-radius: 28px;
        box-shadow: 0 20px 80px rgba(0,0,0,0.45);
        width: min(92vw, 440px);
        padding: 28px;
        text-align: center;
        backdrop-filter: blur(14px);
        z-index: 5;
      }
      .gate h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 6vw, 44px);
      }
      .gate p {
        margin: 0 0 22px;
        opacity: 0.86;
      }
      input {
        width: 100%;
        border: none;
        outline: none;
        border-radius: 16px;
        padding: 16px 18px;
        font-size: 22px;
        text-align: center;
        letter-spacing: 3px;
        margin-bottom: 14px;
      }
      button {
        width: 100%;
        border: none;
        border-radius: 16px;
        padding: 16px 18px;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        background: linear-gradient(135deg, #ff3b3b, #ffb703);
      }
      .error {
        min-height: 24px;
        color: #ff7b7b;
        margin-top: 12px;
        font-weight: 700;
      }
      .card {
        opacity: 0;
        pointer-events: none;
        transition: opacity 700ms ease;
      }
      .card.show {
        opacity: 1;
        pointer-events: auto;
      }
      video.bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.55) saturate(1.2);
      }
      .overlay {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at top, rgba(255,201,60,0.22), transparent 36%),
          radial-gradient(circle at bottom, rgba(255,59,59,0.22), transparent 30%),
          linear-gradient(to bottom, rgba(0,0,0,0.18), rgba(0,0,0,0.35));
      }
      .message {
        position: relative;
        z-index: 2;
        text-align: center;
        padding: 24px;
        text-shadow: 0 6px 18px rgba(0,0,0,0.45);
        animation: pulse 1.8s infinite ease-in-out;
      }
      .message .small {
        display: block;
        font-size: clamp(18px, 3vw, 28px);
        letter-spacing: 0.2em;
        margin-bottom: 10px;
      }
      .message .big {
        display: block;
        font-size: clamp(46px, 11vw, 120px);
        font-weight: 900;
        line-height: 0.95;
        color: #ffd60a;
      }
      .message .sub {
        display: block;
        margin-top: 14px;
        font-size: clamp(22px, 4vw, 40px);
        font-weight: 800;
        color: #fff;
      }
      .confetti {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .piece {
        position: absolute;
        width: 10px;
        height: 22px;
        opacity: 0.85;
        animation: fall linear infinite;
      }
      @keyframes fall {
        from { transform: translateY(-10vh) rotate(0deg); }
        to { transform: translateY(110vh) rotate(720deg); }
      }
      @keyframes pulse {
        0%,100% { transform: scale(1); }
        50% { transform: scale(1.03); }
      }
    </style>
  </head>
  <body>
    <div class="screen" id="gateScreen">
      <div class="gate">
        <h1>Секретный вход</h1>
        <p>Введите пароль</p>
        <input id="password" type="password" inputmode="numeric" placeholder="Пароль" maxlength="4" />
        <button id="enterBtn">Ввод</button>
        <div class="error" id="error"></div>
      </div>
    </div>

    <div class="screen card" id="cardScreen">
      <video class="bg" id="bgVideo" autoplay muted loop playsinline>
        <source src="bg.mp4" type="video/mp4" />
      </video>
      <div class="overlay"></div>
      <div class="message">
        <span class="small">ВНИМАНИЕ</span>
        <span class="big">ПАБЕДА!!!</span>
        <span class="sub">С ДРРРРРРРРРРРРРРРРРР ЯРИИИИККК!!!!!!!!!!!</span>
      </div>
      <div class="confetti" id="confetti"></div>
      <audio id="music" loop>
        <source src="music.mp3" type="audio/mpeg" />
      </audio>
    </div>

    <script>
      const PASS = '1458';
      const input = document.getElementById('password');
      const btn = document.getElementById('enterBtn');
      const error = document.getElementById('error');
      const gate = document.getElementById('gateScreen');
      const card = document.getElementById('cardScreen');
      const music = document.getElementById('music');
      const video = document.getElementById('bgVideo');
      const confetti = document.getElementById('confetti');

      const colors = ['#ff4d6d', '#ffd60a', '#00f5d4', '#ffffff', '#ff9f1c'];
      for (let i = 0; i < 70; i++) {
        const piece = document.createElement('div');
        piece.className = 'piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.top = (-20 - Math.random() * 100) + 'px';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (4 + Math.random() * 6) + 's';
        piece.style.animationDelay = (Math.random() * 4) + 's';
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        confetti.appendChild(piece);
      }

      async function openCard() {
        gate.style.display = 'none';
        card.classList.add('show');
        try { await video.play(); } catch (e) {}
        try {
          music.volume = 0.85;
          await music.play();
        } catch (e) {
          error.textContent = 'Открытка открылась, но браузер заблокировал музыку.';
        }
      }

      function checkPassword() {
        if (input.value === PASS) {
          error.textContent = '';
          openCard();
        } else {
          error.textContent = 'Неправильный пароль 😈';
          input.value = '';
          input.focus();
        }
      }

      btn.addEventListener('click', checkPassword);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') checkPassword();
      });
      input.focus();
    </script>
  </body>
</html>
